name: ML CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run training script
        run: |
          echo "Running training script..."
          python -u train.py

      - name: Validate training output
        run: |
          python -c "import os; \
          assert os.path.exists('best_model.pkl'), 'Model not created!'; \
          print('Model exists ✔')"
      
      - name: Check accuracy threshold
        run: |
          python -c "import json; \
          metrics = json.load(open('metrics.json')); \
          assert metrics['accuracy'] >= 0.9; \
          print(f'Accuracy {metrics[\"accuracy\"]} meets threshold ✔')"


      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: best_model.pkl

      - name: Validate model exists
        run: |
          python -c "import os; \
          assert os.path.exists('best_model.pkl'), 'Model not found in artifact!'; \
          print('Model artifact exists ✔')"